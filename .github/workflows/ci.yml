name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash   # Git Bash on Windows → OS-uniform steps

jobs:
  regression:
    name: Regression (ubuntu · py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[mcp,dev]"
      - name: Full suite (unit + integration + journeys + doc-as-test + leak guard)
        run: python -m pytest tests/ -q

  cross-os:
    name: Cross-OS (${{ matrix.os }})
    if: github.event_name != 'pull_request'   # macOS bills 10x, Windows 2x
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[mcp,dev]"
      - run: python -m pytest tests/ -q

  offline-determinism:
    name: Offline determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - name: Same votes + council → identical decision record + id
        run: |
          a=$(python -m eldercouncil.cli convene code-council --demo --no-audit --json --question "merge q" || true)
          b=$(python -m eldercouncil.cli convene code-council --demo --no-audit --json --question "merge q" || true)
          test "$a" = "$b" || { echo "::error::non-deterministic convene output"; exit 1; }
          echo "$a" | python -c "import sys,json; d=json.load(sys.stdin); assert d['verdict']=='block', d; assert d['route']=='human', d"
          echo "deterministic + correct"

  honesty:
    name: Honesty audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: No overclaims; honest caveats present; correct OWASP-2026 taxonomy
        # Authoritative, whitespace-normalised gate (handles line-wraps + meta docs).
        run: python tools/honesty_check.py

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No live credentials in the tree
        run: |
          set -e
          # NOTE: each token is written so the pattern does NOT match itself in
          # this file — a single key char is wrapped in a one-char class
          # ([I]/[y]) exactly as ASIA/AKIA/gho rely on their trailing [0-9A-Z]
          # bracket. A token written as a bare literal (no regex metachar) would
          # match this workflow file and fail the scan on a clean repo. (Guarded
          # by tests/test_docs.py::test_secret_scan_pattern_has_no_self_match.)
          if grep -rniE "ASIA[0-9A-Z]{12,}|AKIA[0-9A-Z]{12,}|AWSAccessKey[I]d|x-amz-securit[y]-token|-----BEGIN [A-Z ]*PRIVATE KEY-----|gho_[A-Za-z0-9]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|sk-[A-Za-z0-9]{20,}" \
               --exclude-dir=.git . ; then
            echo "::error::possible secret committed"; exit 1
          fi
          echo "no secrets found"

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build --wheel
      - name: Councils + lenses + registry + schema bundled
        run: |
          python - <<'PY'
          import glob, zipfile
          n = zipfile.ZipFile(sorted(glob.glob("dist/*.whl"))[-1]).namelist()
          need = ["eldercouncil/lenses.yaml", "eldercouncil/council-models.json",
                  "eldercouncil/councils/council.schema.json", "eldercouncil/gate-policy.yaml"]
          for f in need:
              assert f in n, f"{f} not bundled"
          assert any(x.startswith("eldercouncil/councils/") and x.endswith(".yaml") for x in n), "no councils bundled"
          assert "eldercouncil/council-models.speculative.example.json" not in n  # fabricated-tag file never ships
          print("bundled data OK")
          PY

  self-audit:
    name: Self supply-chain audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e . pip-audit
      - run: pip-audit --desc

  docs-collateral:
    name: Branded collateral
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[pdf,demo]"
      - name: PDFs byte-stable (committed copies up to date)
        run: |
          python tools/build_pdfs.py
          for f in docs/pdf/Elder-Council-Overview.pdf docs/pdf/Elder-Council-Quickstart.pdf; do
            test -s "$f" || { echo "::error::$f missing/empty"; exit 1; }
          done
          if ! git diff --quiet -- docs/pdf; then
            echo "::error::committed PDFs are stale — run tools/build_pdfs.py and commit"; exit 1
          fi
      - name: Demo + social card regenerate non-empty
        run: |
          python tools/build_demo.py
          python tools/build_social_card.py
          test -s docs/assets/demo-block.gif
          test -s docs/assets/social-card.png
      - uses: actions/upload-artifact@v7
        with:
          name: elder-council-collateral
          path: |
            docs/pdf/*.pdf
            docs/assets/demo-block.*
            docs/assets/social-card.png
