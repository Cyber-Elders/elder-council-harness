# SPDX-License-Identifier: Apache-2.0
name: UAT (clean install)

# Build the wheel, CLEAN-install it into a fresh venv (NOT editable), and run a
# real `eldercouncil` CLI journey on Linux, macOS, and Windows. Exercises the
# packaged console entry-point and on-disk file I/O the way a real user gets it —
# catching packaging / entry-point / encoding bugs the editable-install
# regression CI cannot see. Dispatch-triggered to control macOS (10x) / Windows
# (2x) billing.

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  uat:
    name: "Clean install + CLI journey (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + clean-install into a fresh venv (the user's real path)
        run: |
          python -m pip install --quiet build
          python -m build --wheel
          python -m venv uatenv
          if [ -d uatenv/Scripts ]; then VBIN="$(pwd)/uatenv/Scripts"; else VBIN="$(pwd)/uatenv/bin"; fi
          "$VBIN/python" -m pip install --quiet --upgrade pip
          "$VBIN/pip" install --quiet "$(ls dist/*.whl)"
          echo "$VBIN" >> "$GITHUB_PATH"

      - name: Real CLI user journey
        run: |
          set -e
          eldercouncil version | tee ver.txt | grep -q "0.1.0"
          eldercouncil list | grep -q "code-council"
          for c in code-council threat-hunting supply-chain compliance cyber-risk platform-architecture; do
            eldercouncil show "$c" >/dev/null
          done

          work=$(mktemp -d); cd "$work"
          export COUNCIL_DIR="$work/.council"

          eldercouncil install claude-code --all
          test -f .claude/settings.json
          test -f .council/council-models.json
          eldercouncil install kiro --all
          test -f .kiro/specs/compliance.md

          # the demo is an illustration (exit 0); it must show a contested BLOCK verdict
          eldercouncil convene code-council --demo --question "merge a hardcoded secret" > out.txt
          cat out.txt
          grep -q "block" out.txt
          grep -q "dissent preserved" out.txt
          # a real (gating) convene of a blocked decision exits 2:
          set +e
          eldercouncil convene code-council --demo --no-audit --question "x" >/dev/null; demo_rc=$?
          set -e
          test "$demo_rc" -eq 0   # --demo never "fails" as an onboarding command

          eldercouncil verify
          echo "UAT journey passed on ${{ matrix.os }}"

      - name: Upload UAT artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: uat-${{ matrix.os }}
          path: ver.txt
          retention-days: 7
          if-no-files-found: ignore
